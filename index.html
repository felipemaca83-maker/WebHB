<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        h1, h2, .btn-generic {
            font-family: 'Caveat', cursive;
        }

        .text-container {
            text-align: center;
            z-index: 20;
            max-width: 85%;
            pointer-events: none;
        }

        h1 {
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
            margin-bottom: 10px;
        }

        p {
            text-shadow: 1px 1px 10px rgba(0, 0, 0, 0.9);
            font-size: 1.25rem;
            line-height: 1.6;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            z-index: 10;
        }

        .active {
            display: flex;
            opacity: 1;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            object-fit: cover;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -4;
        }

        .btn-generic {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px 35px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.7rem;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(255, 117, 140, 0.4);
            opacity: 0;
            transition: opacity 1s ease, transform 0.2s;
            z-index: 100;
            pointer-events: auto;
        }

        .btn-generic:active { transform: scale(0.95); }

        .foto-marco {
            position: absolute;
            width: 80px;
            background: white;
            padding: 5px;
            padding-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 1s ease;
        }

        .foto-marco img {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        .pos1 { top: 12%; left: 10%; transform: rotate(-10deg); }
        .pos2 { top: 38%; right: 10%; transform: rotate(15deg); }
        .pos3 { top: 68%; left: 12%; transform: rotate(-5deg); }
        .pos4 { top: 72%; right: 12%; transform: rotate(-12deg); }

        .cursor::after {
            content: "|";
            animation: parpadeo 0.7s infinite;
            color: var(--secondary);
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        #video-final-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 500;
        }

        .fade-out {
            opacity: 0 !important;
            transition: opacity 1.5s ease;
        }
    </style>
</head>

<body>

    <div id="screen-start" class="screen active" style="background: radial-gradient(circle, #1a1a2e, #000);">
        <h1 style="font-size: 3.5rem;">Hola...</h1>
        <p style="opacity: 0.8;">Tengo algo para decirte.</p>
        <button class="btn-generic" style="opacity:1;" onclick="startExperience()">Abrir detalle 🌸</button>
    </div>

    <div id="screen-main" class="screen">
        <video class="video-background" muted loop playsinline id="main-bg-video" preload="auto">
            <source src="https://www.dropbox.com/scl/fi/ctcfdqs01cb0yu2ehy84j/lv_0_20260309145550.mp4?rlkey=b5nwijf62fvww113iqyr217yu&st=n1e1h3nm&raw=1" type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div id="collage" style="position:fixed; width:100%; height:100%; z-index:-2; pointer-events:none;">
            <div class="foto-marco pos1"><img src="https://lh3.googleusercontent.com/u/0/d/16RKXMXGo29QZphsXFTba3XTXirhSTE1T"></div>
            <div class="foto-marco pos2"><img src="https://lh3.googleusercontent.com/u/0/d/1hV4k1GuvKjxyUpu05ejDkZ4u65lPLQP-"></div>
            <div class="foto-marco pos3"><img src="https://lh3.googleusercontent.com/u/0/d/17ll_u-c7gtKxQUBSHqrxMc9pVzvOsb3D"></div>
            <div class="foto-marco pos4"><img src="https://lh3.googleusercontent.com/u/0/d/1855o1Tz7C3tOtH5Xmn0ITz722SRWhI4R"></div>
        </div>

        <div class="text-container" id="card-main">
            <h1 id="tw1-h1" data-text="Para ti 🌸" style="font-size: 3rem;"></h1>
            <p id="tw1-p" data-text="Eres una mujer increíble, capaz de iluminar cualquier lugar con tu esencia. Nunca dejes de perseguir lo que te hace feliz."></p>
        </div>
        <button class="btn-generic" id="btn-next" onclick="changeScreen('screen-main', 'screen-final')">Continuar ✨</button>
    </div>

    <div id="screen-final" class="screen" style="background: radial-gradient(circle, #1a1a2e, #000);">
        <div class="text-container" id="card-final">
            <h1 id="tw2-h1" data-text="Antes de terminar..." style="font-size: 2.8rem;"></h1>
            <p id="tw2-p" data-text="Hay momentos que se quedan grabados no por lo que pasó, sino por con quién los vivimos. Gracias por ser parte de mi historia."></p>
        </div>
        <button class="btn-generic" id="btn-play" onclick="playRegalo()">Toca aquí (Play) ▶️</button> 

        <div id="video-final-container">
            <video id="video-regalo" muted playsinline style="width:100%; height:100%; object-fit:contain;">
                <source src="https://www.dropbox.com/scl/fi/i4v6qkynmf6vsh9tg0smi/lv_7414675558627314999_20260309153956.mp4?rlkey=jsfb0vbf153zgporcwgcvt79v&st=5haar070&raw=1" type="video/mp4">
            </video>
        </div>

        <h1 id="msg-cierre" style="display:none; font-size: 3.5rem; color: var(--secondary); text-align:center;">¡Te quiero mucho! ❤️</h1>
    </div>

    <audio id="musica" loop>
        <source src="https://www.dropbox.com/scl/fi/ma9rlcj0rdmqnsiof2k7x/Passenger-Let-Her-Go-Official-Video.mp3?rlkey=q8gjycafvt65vtfjkko4g5x7i&st=oi6e7xyv&raw=1" type="audio/mpeg">
    </audio>

    <script>
        function startExperience() {
            const musica = document.getElementById('musica');
            const bgVideo = document.getElementById('main-bg-video');
            
            musica.play().catch(e => console.log("Audio activo"));
            bgVideo.play().catch(e => console.log("Video activo"));
            
            changeScreen('screen-start', 'screen-main');
        }

        function changeScreen(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            
            hideEl.style.opacity = '0';
            setTimeout(() => {
                hideEl.style.display = 'none';
                showEl.style.display = 'flex';
                showEl.style.opacity = '0';
                setTimeout(() => {
                    showEl.style.opacity = '1';
                    showEl.classList.add('active');
                    if (showId === 'screen-main') initMainSequence();
                    if (showId === 'screen-final') initFinalSequence();
                }, 50);
            }, 800);
        }

        function escribir(el, vel, cb) {
            const txt = el.getAttribute('data-text');
            let i = 0; el.textContent = ""; el.classList.add('cursor');
            function t() {
                if (i < txt.length) {
                    el.textContent += txt.charAt(i); i++; setTimeout(t, vel);
                } else {
                    el.classList.remove('cursor'); if (cb) cb();
                }
            }
            t();
        }

        function initMainSequence() {
            const fotos = document.querySelectorAll('.foto-marco');
            const card = document.getElementById('card-main');
            const btn = document.getElementById('btn-next');

            fotos.forEach((f, i) => { setTimeout(() => f.style.opacity = '1', 600 * (i + 1)); });

            escribir(document.getElementById('tw1-h1'), 70, () => {
                escribir(document.getElementById('tw1-p'), 45, () => {
                    setTimeout(() => {
                        card.classList.add('fade-out');
                        setTimeout(() => { btn.style.opacity = '1'; }, 2000);
                    }, 3500);
                });
            });
        }

        function initFinalSequence() {
            const card = document.getElementById('card-final');
            const btn = document.getElementById('btn-play');

            escribir(document.getElementById('tw2-h1'), 70, () => {
                escribir(document.getElementById('tw2-p'), 45, () => {
                    setTimeout(() => {
                        card.classList.add('fade-out');
                        setTimeout(() => { btn.style.opacity = '1'; }, 2000);
                    }, 3500);
                });
            });
        }

        function playRegalo() {
            const container = document.getElementById('video-final-container');
            const video = document.getElementById('video-regalo');
            const btnPlay = document.getElementById('btn-play');

            // NO pausamos la música aquí
            btnPlay.style.display = 'none';
            container.style.display = 'block';
            video.play();

            video.onended = function () {
                container.style.display = 'none';
                document.getElementById('msg-cierre').style.display = 'block';
            };
        }
    </script>
</body>
</html>
