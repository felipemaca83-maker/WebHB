<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --glass: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: white;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        h1, h2, .caption, .btn-generic {
            font-family: 'Caveat', cursive;
        }

        /* --- PANTALLAS (ESTRUCTURA) --- */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            z-index: 10;
        }

        .active { display: flex; opacity: 1; }

        /* --- VIDEO DE FONDO (PANTALLA 2) --- */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -5;
            object-fit: cover;
        }

        .video-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); /* Capa oscura */
            z-index: -4;
        }

        /* --- COMPONENTES VISUALES --- */
        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 25px; border-radius: 20px;
            width: 85%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-generic {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none; padding: 10px 30px; color: white;
            border-radius: 50px; cursor: pointer; font-size: 1.5rem;
            margin-top: 20px; box-shadow: 0 5px 15px rgba(255,117,140,0.4);
            text-decoration: none; display: inline-block;
        }

        /* --- FOTOS DISPERSAS (PARALLAX) --- */
        .collage-container { position: fixed; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        
        .foto-marco { 
            position: absolute; width: 75px; background: white; padding: 5px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0; 
            transition: opacity 1s ease, transform 0.1s linear;
        }
        .foto-marco img { width: 100%; height: 75px; object-fit: cover; }

        /* Posiciones iniciales */
        .pos1 { top: 15%; left: 10%; transform: rotate(-10deg); }
        .pos2 { top: 40%; right: 10%; transform: rotate(15deg); }
        .pos3 { top: 70%; left: 15%; transform: rotate(-5deg); }

        /* --- MÁQUINA DE ESCRIBIR --- */
        .cursor::after { content: "|"; animation: parpadeo 0.7s infinite; color: var(--secondary); }
        @keyframes parpadeo { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* --- VIDEO FINAL --- */
        #video-final-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 500;
        }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active" style="background: #0f0c29;">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px;">Hola...</h1>
        <p style="opacity: 0.8; margin-bottom: 30px;">Tengo algo para decirte.</p>
        <button class="btn-generic" onclick="changeScreen('screen-start', 'screen-main')">Abrir detalle 🌸</button>
    </div>

    <div id="screen-main" class="screen">
        <video class="video-background" autoplay muted loop playsinline id="main-bg-video">
            <source src="https://www.dropbox.com/scl/fi/erv0pjgvoc4ma04ol7d8a/vfinal.mov?rlkey=zjl3bjk65z2n0gl7vw831jyx2&st=o7c38krh&raw=1" type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div class="collage-container">
            <div class="foto-marco pos1" id="f1" data-depth="0.2"><img src="https://www.dropbox.com/scl/fi/ya759sf1vi4vbpprwa1vz/atrapados.JPG?rlkey=m1jgd21ecjby137s89vwocx24&st=7flt1qf4&raw=1"></div>
            <div class="foto-marco pos2" id="f2" data-depth="0.4"><img src="https://www.dropbox.com/scl/fi/ya759sf1vi4vbpprwa1vz/atrapados.JPG?rlkey=m1jgd21ecjby137s89vwocx24&st=7flt1qf4&raw=1"></div>
            <div class="foto-marco pos3" id="f3" data-depth="0.3"><img src="https://www.dropbox.com/scl/fi/ya759sf1vi4vbpprwa1vz/atrapados.JPG?rlkey=m1jgd21ecjby137s89vwocx24&st=7flt1qf4&raw=1"></div>
        </div>

        <div class="hero-card">
            <h1 id="tw1-h1" data-text="Para ti 🌸" style="font-size: 2.5rem; margin: 0;"></h1>
            <p id="tw1-p" data-text="Eres una mujer increíble, capaz de iluminar cualquier lugar con tu esencia. Nunca dejes de perseguir lo que te hace feliz." style="font-size: 1.1rem; line-height: 1.6;"></p>
            <button class="btn-generic" id="btn-next" style="display:none;" onclick="changeScreen('screen-main', 'screen-final')">Continuar ✨</button>
        </div>
        <div style="height: 20vh; width: 100%;"></div> </div>

    <div id="screen-final" class="screen" style="background: radial-gradient(circle, #1a1a2e, #000);">
        <div class="hero-card" style="background: transparent; border: none; backdrop-filter: none;">
            <h1 id="tw2-h1" data-text="Antes de terminar..." style="font-size: 2.5rem;"></h1>
            <p id="tw2-p" data-text="Hay momentos que se quedan grabados no por lo que pasó, sino por con quién los vivimos. Gracias por ser parte de mi historia y por permitirme ser parte de la tuya." style="font-size: 1.1rem; line-height: 1.8;"></p>
            <button class="btn-generic" id="btn-play" style="display:none;" onclick="playRegalo()">Toca aquí (Play) ▶️</button>
        </div>

        <div id="video-final-container">
            <video id="video-regalo" style="width:100%; height:100%; object-fit:contain;">
                <source src="https://www.dropbox.com/scl/fi/erv0pjgvoc4ma04ol7d8a/vfinal.mov?rlkey=zjl3bjk65z2n0gl7vw831jyx2&st=o7c38krh&raw=1" type="video/mp4">
            </video>
        </div>

        <h1 id="msg-cierre" style="display:none; font-size: 4rem; color: var(--secondary); text-align: center; padding: 20px;">¡Te quiero mucho! ❤️</h1>
    </div>

    <audio id="musica" loop><source src="https://www.dropbox.com/scl/fi/ma9rlcj0rdmqnsiof2k7x/Passenger-Let-Her-Go-Official-Video.mp3?rlkey=q8gjycafvt65vtfjkko4g5x7i&st=oi6e7xyv&raw=1" type="audio/mpeg"></audio>

    <script>
        // --- NAVEGACIÓN ENTRE PANTALLAS ---
        function changeScreen(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);

            hideEl.style.opacity = '0';
            setTimeout(() => {
                hideEl.style.display = 'none';
                showEl.style.display = 'flex';
                showEl.style.opacity = '0';
                
                setTimeout(() => {
                    showEl.style.opacity = '1';
                    showEl.classList.add('active');
                    
                    if(showId === 'screen-main') {
                        document.body.style.overflowY = 'auto';
                        document.getElementById('musica').play();
                        initMainSequence();
                    }
                    if(showId === 'screen-final') {
                        window.scrollTo(0,0);
                        document.body.style.overflow = 'hidden';
                        initFinalSequence();
                    }
                }, 50);
            }, 800);
        }

        // --- MÁQUINA DE ESCRIBIR ---
        function escribir(el, vel, cb) {
            const txt = el.getAttribute('data-text');
            let i = 0; el.textContent = ""; el.classList.add('cursor');
            function t() {
                if (i < txt.length) { 
                    el.textContent += txt.charAt(i); 
                    i++; 
                    setTimeout(t, vel); 
                } else { 
                    el.classList.remove('cursor'); 
                    if(cb) cb();
                }
            }
            t();
        }

        // --- SECUENCIAS ---
        function initMainSequence() {
            // Animación fotos
            const fotos = document.querySelectorAll('.foto-marco');
            fotos.forEach((f, i) => {
                setTimeout(() => f.style.opacity = '1', 600 * (i+1));
            });
            // Escritura
            escribir(document.getElementById('tw1-h1'), 70, () => {
                escribir(document.getElementById('tw1-p'), 40, () => {
                    document.getElementById('btn-next').style.display = 'inline-block';
                });
            });
            // Parallax
            window.addEventListener('scroll', () => {
                const scrolled = window.pageYOffset;
                fotos.forEach(f => {
                    const depth = f.getAttribute('data-depth');
                    f.style.transform = `translateY(-${scrolled * depth}px) rotate(${f.classList.contains('pos1') ? -10 : f.classList.contains('pos2') ? 15 : -5}deg)`;
                });
            });
        }

        function initFinalSequence() {
            escribir(document.getElementById('tw2-h1'), 70, () => {
                escribir(document.getElementById('tw2-p'), 45, () => {
                    const btn = document.getElementById('btn-play');
                    btn.style.display = 'inline-block';
                });
            });
        }

        function playRegalo() {
            const container = document.getElementById('video-final-container');
            const video = document.getElementById('video-regalo');
            const musica = document.getElementById('musica');
            
            musica.pause();
            container.style.display = 'block';
            video.play();

            video.onended = function() {
                container.style.display = 'none';
                document.getElementById('final-deep-msg')?.style.setProperty('display', 'none');
                document.querySelector('#screen-final .hero-card').style.display = 'none';
                document.getElementById('msg-cierre').style.display = 'block';
            };
        }
    </script>
</body>
</html>
