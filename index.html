<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        h1,
        h2,
        .btn-generic {
            font-family: 'Caveat', cursive;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* --- PANTALLAS --- */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            z-index: 10;
        }

        .active {
            display: flex;
            opacity: 1;
        }

        /* --- FONDO --- */
        .video-background {
            opacity: 0;
            transition: opacity 2s ease;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            object-fit: cover;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            /* Overlay más oscuro para legibilidad */
            z-index: -4;
        }

        /* --- COMPONENTES --- */
        .btn-generic {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 10px 30px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.5rem;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            opacity: 0;
            display: none;
            transition: opacity 1s ease, transform 0.3s ease;
            z-index: 100;
        }

        /* --- FOTOS --- */
        #collage {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .foto-marco {
            position: absolute;
            width: 75px;
            background: white;
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 1s ease, transform 0.1s linear;
        }

        .foto-marco img {
            width: 100%;
            height: 75px;
            object-fit: cover;
        }

        .pos1 {
            top: 10%;
            left: 10%;
            transform: rotate(-10deg);
        }

        .pos2 {
            top: 25%;
            right: 10%;
            transform: rotate(15deg);
        }

        .pos3 {
            top: 75%;
            left: 15%;
            transform: rotate(-5deg);
        }

        .pos4 {
            top: 85%;
            right: 15%;
            transform: rotate(-12deg);
        }

        /* --- EFECTO CRÉDITOS (SCROLL HACIA ARRIBA) --- */
        .credits-container {
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 85%;
            height: 70vh;
            overflow: hidden;
            position: relative;
            text-align: center;
        }

        .credits-text {
            position: absolute;
            width: 100%;
            top: 100%;
            /* Inicia justo debajo del borde inferior del contenedor */
            opacity: 1;
        }

        .credits-text p {
            font-size: 1.05rem;
            line-height: 1.7;
            margin: 0;
        }

        /* Definición de la animación de scroll hacia arriba */
        @keyframes scrollCredits {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-200%);
            }

            /* Sube hasta desaparecer por completo */
        }

        /* --- SALUDO FINAL (Después del scroll) --- */
        #birthday-greeting {
            display: none;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease;
            position: fixed;
            top: 45%;
            /* Subimos un poco el texto (estaba en 50%) */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            z-index: 15;
        }

        #screen-main .btn-generic {
            position: fixed;
            top: 60%;
            /* El botón aparecerá al 60% de la altura, debajo del texto */
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- VIDEO FINAL --- */
        #video-final-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 500;
        }

        /* --- CURSOR MÁQUINA DE ESCRIBIR --- */
        .cursor::after {
            content: "|";
            animation: parpadeo 0.7s infinite;
            color: var(--secondary);
        }

        @keyframes scrollCredits {
            0% {
                top: 100%;
                transform: translateY(0);
            }

            100% {
                top: 0%;
                transform: translateY(-110%);
                /* Sube hasta que su propio tamaño quede fuera */
            }
        }
    </style>
</head>

<body>

    <div id="screen-start" class="screen active" style="background: #0f0c29;">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px;">Hola...</h1>
        <p style="opacity: 0.8; margin-bottom: 30px;">Tengo algo para decirte.</p>
        <button class="btn-generic" style="opacity:1; display:inline-block;"
            onclick="changeScreen('screen-start', 'screen-main')">Abrir detalle 🌸</button>
    </div>

    <div id="screen-main" class="screen">
        <video class="video-background" autoplay muted loop playsinline id="main-bg-video">
            <source
                src="https://www.dropbox.com/scl/fi/5qdk4xuhb4f2fr16utwyr/lv_0_20260309180107.mp4?rlkey=1utczkkugl2x4fbvvv3pf9rdb&raw=1"
                type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div id="collage">
            <div class="foto-marco pos1" data-depth="0.2"><img
                    src="https://lh3.googleusercontent.com/u/0/d/16RKXMXGo29QZphsXFTba3XTXirhSTE1T"></div>
            <div class="foto-marco pos2" data-depth="0.4"><img
                    src="https://lh3.googleusercontent.com/u/0/d/1hV4k1GuvKjxyUpu05ejDkZ4u65lPLQP-"></div>
            <div class="foto-marco pos3" data-depth="0.3"><img
                    src="https://lh3.googleusercontent.com/u/0/d/17ll_u-c7gtKxQUBSHqrxMc9pVzvOsb3D"></div>
            <div class="foto-marco pos4" data-depth="0.5"><img
                    src="https://lh3.googleusercontent.com/u/0/d/1855o1Tz7C3tOtH5Xmn0ITz722SRWhI4R"></div>
        </div>

        <div class="credits-container" id="credits-container">
            <div class="credits-text" id="credits-text">
                <p>
                    Hoy quiero desearte un feliz cumpleaños de una manera especial.<br>Aunque estemos distanciados,
                    quiero que sepas que festejo cada uno de tus logros en silencio.<br><br>Conozco de cerca el esfuerzo
                    <!-- que hay detrás de cada paso que das y sé, mejor que nadie, cuánto te lo mereces.<br><br>Me llena de
                    alegría ver que estás alcanzando todo aquello que alguna vez me confiaste; en el fondo, siempre fue
                    mi deseo que tus sueños se cumplieran.<br><br>Mi mayor anhelo es que sigas siendo feliz, rodeada de
                    la familia que tanto te ama y haciendo lo que te apasiona.<br><br>Por eso, cada vez que alcances una
                    nueva meta, recuerda que en algún lugar siempre habrá alguien alegrándose por ti, aunque no esté
                    presente ahí.<br><br>Que Dios te bendiga en cada paso, te proteja de todo mal y que a tu vida le
                    lluevan bendiciones y cosas hermosas.<br><br><br> -->
                </p>
            </div>
        </div>

        <div id="birthday-greeting">
            <h1 data-text="¡Feliz cumpleaños, Dayana! ✨<br>Feliz vuelta al sol."
                style="font-size: 2.2rem; margin: 0; line-height: 1.3;"></h1>
        </div>

        <button class="btn-generic" id="btn-next" onclick="changeScreen('screen-main', 'screen-final')">Continuar
            ✨</button>
    </div>

    <div id="screen-final" class="screen" style="background: radial-gradient(circle, #1a1a2e, #000);">
        <h1 id="tw2-h1" data-text="Antes de terminar..."
            style="font-size: 2.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8);"></h1>
        <p id="tw2-p"
            data-text="Hay momentos que se quedan grabados no por lo que pasó, sino por con quién los vivimos. Gracias por ser parte de mi historia y por permitirme ser parte de la tuya."
            style="font-size: 1.1rem; line-height: 1.8; text-align: center; width: 85%; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
        </p>

        <button class="btn-generic" id="btn-play" onclick="playRegalo()">Toca aquí (Play) ▶️</button>

        <div id="video-final-container">
            <video id="video-regalo" muted playsinline style="width:100%; height:100%; object-fit:contain;">
                <source
                    src="https://www.dropbox.com/scl/fi/i4v6qkynmf6vsh9tg0smi/lv_7414675558627314999_20260309153956.mp4?rlkey=jsfb0vbf153zgporcwgcvt79v&st=cusesvwe&raw=1"
                    type="video/mp4">
            </video>
        </div>
        <h1 id="msg-cierre"
            style="display:none; font-size: 3.5rem; color: var(--secondary); text-align: center; font-family:'Caveat'; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
            ¡Te quiero mucho! ❤️</h1>
    </div>

    <audio id="musica" loop>
        <source
            src="https://www.dropbox.com/scl/fi/ma9rlcj0rdmqnsiof2k7x/Passenger-Let-Her-Go-Official-Video.mp3?rlkey=q8gjycafvt65vtfjkko4g5x7i&st=oi6e7xyv&raw=1"
            type="audio/mpeg">
    </audio>

    <script>
        const musica = document.getElementById('musica');

        // --- NAVEGACIÓN ---
        function changeScreen(hideId, showId) {
            if (hideId === 'screen-start') {
                musica.play().catch(e => console.log("Error música:", e));
                // Forzar el inicio del video al hacer click en el primer botón
                const videoFondo = document.getElementById('main-bg-video');
                if (videoFondo) videoFondo.play();
            }

            const h = document.getElementById(hideId);
            const s = document.getElementById(showId);
            h.style.opacity = '0';

            setTimeout(() => {
                h.style.display = 'none';
                s.style.display = 'flex';
                s.style.opacity = '0';
                setTimeout(() => {
                    s.style.opacity = '1';
                    if (showId === 'screen-main') initCreditsSequence();
                    if (showId === 'screen-final') initFinalSequence();
                }, 50);
            }, 800);
        }

        // --- MÁQUINA DE ESCRIBIR ---
        function escribir(el, vel, cb) {
            const txt = el.getAttribute('data-text');
            let i = 0; el.innerHTML = ""; el.classList.add('cursor');
            function t() {
                if (i < txt.length) {
                    let c = txt.charAt(i);
                    // Soporte para <br>
                    if (c === '<' && txt.substring(i, i + 4) === '<br>') {
                        el.innerHTML += '<br>'; i += 4;
                    } else {
                        el.innerHTML += c; i++;
                    }
                    setTimeout(t, vel);
                } else { el.classList.remove('cursor'); if (cb) cb(); }
            }
            t();
        }

        // --- SECUENCIA PANTALLA 2: CRÉDITOS ---
        function initCreditsSequence() {
            const video = document.getElementById('main-bg-video');
            const fotos = document.querySelectorAll('.foto-marco');
            const creditsContainer = document.getElementById('credits-container');
            const creditsText = document.getElementById('credits-text');
            const btn = document.getElementById('btn-next');
            const greeting = document.getElementById('birthday-greeting');
            const greetingH1 = greeting.querySelector('h1');

            // 1. EL VIDEO APARECE PRIMERO (Microsegundos después de entrar)
            setTimeout(() => {
                video.style.opacity = "1";
                video.play().catch(e => console.log("Error video:", e));
            }, 150);

            // 2. LAS FOTOS APARECEN SEGUNDO (Escalonadas entre ellas)
            fotos.forEach((f, i) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, 500 + (250 * i)); // Aparecen una tras otra tras medio segundo
            });

            // 3. EL TEXTO INICIA TERCERO (Cuando ya hay ambiente visual)
            setTimeout(() => {
                creditsContainer.style.opacity = "1";
                // Iniciamos el scroll. 25s es una buena velocidad para leer con el video de fondo.
                creditsText.style.animation = "scrollCredits 15s linear forwards";
            }, 1500);

            // 4. FINAL DE LOS CRÉDITOS Y SALUDO
            creditsText.addEventListener('animationend', () => {
                creditsContainer.style.transition = "opacity 0.5s ease";
                creditsContainer.style.opacity = '0';

                setTimeout(() => {
                    creditsContainer.style.display = 'none';
                    greeting.style.display = 'block';
                    greeting.style.opacity = '1';

                    // Escribimos el saludo final
                    escribir(greetingH1, 70, () => {
                        setTimeout(() => {
                            btn.style.display = 'inline-block';
                            setTimeout(() => btn.style.opacity = '1', 100);
                        }, 2500);
                    });
                }, 500);
            });
        }

        // --- SECUENCIA PANTALLA 3 ---
        function initFinalSequence() {
            escribir(document.getElementById('tw2-h1'), 70, () => {
                escribir(document.getElementById('tw2-p'), 45, () => {
                    setTimeout(() => {
                        document.getElementById('btn-play').style.display = 'inline-block';
                        setTimeout(() => document.getElementById('btn-play').style.opacity = '1', 100);
                    }, 1000);
                });
            });
        }

        function playRegalo() {
            const container = document.getElementById('video-final-container');
            const video = document.getElementById('video-regalo');
            document.getElementById('btn-play').style.display = 'none';
            document.getElementById('screen-final').querySelectorAll('h1, p').forEach(el => el.style.opacity = '0');

            container.style.display = 'block';
            video.load();
            setTimeout(() => { video.play().catch(e => console.log(e)); }, 150);

            video.onended = () => {
                container.style.display = 'none';
                document.getElementById('msg-cierre').style.display = 'block';
            };
        }
    </script>
</body>

</html>
